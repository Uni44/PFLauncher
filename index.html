<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PF Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
:root {
    --zzz-yellow: #ffda00;
    --zzz-pink: #ff69b4;
    --zzz-dark: #101010;
    --zzz-bg-glass: rgba(0, 0, 0, 0.7);
    --zzz-border: rgba(255, 255, 255, 0.1);
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { 
    box-sizing: border-box; 
    user-select: none; /* Evita que seleccionen texto por error en el launcher */
}

body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    font-family: 'Roboto', sans-serif;
    overflow: hidden;
    background: #000; /* Color de respaldo */
}

#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: 1; /* Por debajo de todo */
    object-fit: cover; /* Evita que se estire feo */
}

/* Contenedor principal con overlay para que el fondo no sature el texto */
.main-screen {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 40px 60px;
    z-index: 2;

    /* Gradiente dinámico: oscuro a la izquierda para las noticias, 
       más claro a la derecha para ver el video */
    background: linear-gradient(
        to right, 
        rgba(0, 0, 0, 0.7) 0%, 
        rgba(0, 0, 0, 0.3) 50%,
        transparent 100%
    );
}

/* --- BARRA SUPERIOR --- */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-app-region: drag;
    z-index: 100;
}

.game-logo {
    font-family: 'Exo 2', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: white;
    text-transform: uppercase;
    letter-spacing: -1px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
}

.window-controls { -webkit-app-region: no-drag; }
.window-controls button {
    background: none; border: none; color: white;
    font-size: 18px; cursor: pointer; padding: 10px;
    opacity: 0.5; transition: var(--transition);
}
.window-controls button:hover { opacity: 1; transform: scale(1.1); }
.window-controls button:last-child:hover { color: #ff4444; }

/* --- PANEL DE NOTICIAS --- */
.left-content {
    margin-top: auto;
    margin-bottom: 30px;
    width: 380px;
    z-index: 5;
    animation: fadeInSlide 0.8s ease-out;
}

.news-panel {
    background: var(--zzz-bg-glass);
    border-radius: 12px;
    padding: 24px;
    backdrop-filter: blur(15px);
    border: 1px solid var(--zzz-border);
    border-left: 6px solid var(--zzz-yellow);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.news-tabs { 
    display: flex; 
    gap: 20px; 
    margin-bottom: 15px; 
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
}
.news-tabs .active { 
    color: var(--zzz-yellow); 
    border-bottom: 2px solid var(--zzz-yellow);
    padding-bottom: 4px;
}

.news-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    padding: 12px 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    color: rgba(255,255,255,0.9);
    transition: var(--transition);
}

#news-list a { text-decoration: none; color: inherit; }

#news-list a:hover .news-item {
    background: rgba(255, 255, 255, 0.05);
    padding-left: 15px; /* Efecto de empuje */
    color: var(--zzz-yellow);
}

.news-item span:last-child {
    font-size: 12px;
    opacity: 0.5;
}

/* --- BOTÓN DE ACCIÓN (PLAY) --- */
.bottom-right {
    position: absolute;
    bottom: 50px;
    right: 60px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 15px;
}

#actionButton {
    background: var(--zzz-yellow);
    color: black;
    border: none;
    padding: 18px 70px;
    font-family: 'Exo 2', sans-serif;
    font-weight: 900;
    font-size: 26px;
    border-radius: 4px; /* Un poco más cuadrado para verse "tech" */
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 30px rgba(255, 218, 0, 0.2);
    transition: var(--transition);
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
}

/* Efecto de brillo que pasa por el botón */
#actionButton::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 20%; height: 200%;
    background: rgba(255,255,255,0.4);
    transform: rotate(30deg);
    transition: none;
}

#actionButton:hover::after {
    left: 150%;
    transition: 0.7s ease-in-out;
}

#actionButton:hover { 
    transform: translateY(-5px); 
    box-shadow: 0 10px 40px rgba(255, 218, 0, 0.4);
    background: #fff;
}

#actionButton:active { transform: translateY(0); }

.btn-play-icon {
    background: black;
    color: white;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

/* --- REDES SOCIALES --- */
.side-socials {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 25px;
    background: rgba(0,0,0,0.3);
    padding: 20px 12px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
    border: 1px solid var(--zzz-border);
}

.side-socials span { 
    font-size: 20px; 
    cursor: pointer; 
    opacity: 0.6; 
    transition: var(--transition); 
    color: white;
}
.side-socials span:hover { 
    opacity: 1; 
    transform: scale(1.2); 
    color: var(--zzz-yellow);
}

/* --- LOGS Y PROGRESO --- */
.minimal-log {
    font-family: monospace;
    font-size: 11px;
    color: var(--zzz-yellow);
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.8;
	transition: var(--transition);
    text-shadow: 0 0 5px rgba(255, 218, 0, 0.3);
}

/* Animación de entrada para el texto del log */
@keyframes textReveal {
    from { 
        opacity: 0; 
        transform: translateX(-10px); 
        filter: blur(5px);
    }
    to { 
        opacity: 1; 
        transform: translateX(0); 
        filter: blur(0);
    }
}

.text-animate {
    animation: textReveal 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
}

.progress-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.05);
}

#progress {
    width: 0%; height: 100%;
    background: var(--zzz-yellow);
    box-shadow: 0 0 15px var(--zzz-yellow);
    transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
}

/* --- ANIMACIONES --- */
@keyframes fadeInSlide {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

@keyframes pulseDisabled {
    0% { opacity: 0.6; }
    50% { opacity: 0.4; }
    100% { opacity: 0.6; }
}

#actionButton:disabled {
    animation: pulseDisabled 2s infinite ease-in-out;
}
    </style>
</head>
<body>
<video autoplay muted loop id="bg-video">
    <source src="assets/background_video.mp4" type="video/mp4">
</video>
<div class="main-screen">
    <div class="top-bar">
        <div class="game-logo">PF Launcher</div>
        <div class="window-controls">
            <button onclick="minimizar()">—</button>
            <button onclick="cerrar()">✕</button>
        </div>
    </div>

    <div class="side-socials">
        <span>☢️</span><span>☢️</span><span>☢️</span><span>☢️</span>
    </div>

    <div class="left-content">
        <div class="news-panel">
            <div class="news-tabs">
                <span class="active" data-i18n="news_title">Anuncios</span>
            </div>
            <div id="news-list">
			<a href="assets/test.html">
                <div class="news-item"><span>Actualización de versión 0.12.2</span> <span>07/03</span></div>
			</a>
			<a href="assets/test.html">
                <div class="news-item"><span>Evento «Armonía de delusiones»</span> <span>20/02</span></div>
			</a>
            </div>
        </div>
    </div>

    <div class="minimal-log" id="log">Sistema listo.</div>

    <div class="bottom-right">
        <button id="actionButton" onclick="descargar()">
            <div class="btn-play-icon">▶</div>
            <span id="btnText">...</span>
        </button>
    </div>

    <div class="progress-container">
        <div id="progress"></div>
    </div>
</div>

<script>
    const i18n = {
        es: {
            btn_play: "Comenzar juego",
            btn_download: "Descargar juego",
            btn_downloading: "Descargando",
            btn_update: "Actualizar",
            news_title: "Anuncios",
            // Llaves para estados dinámicos (desde Python)
            status_ready: "Sistema listo",
            status_error: "Error de conexión",
            status_updating: "Nueva versión detectada {version}",
            status_downloading: "Descargando: {current} MB / {total} MB",
            status_updated: "¡Listo! Versión {version} instalada",
            error_internet: "Sin conexión. Usando versión local",
            status_extracting: "Extrayendo archivos",
            status_opening: "Abriendo el juego"
        },
        en: {
            btn_play: "Start Game",
            btn_download: "Download Game",
            btn_downloading: "Downloading",
            btn_update: "Update",
            news_title: "Announcements",
            // Llaves para estados dinámicos (desde Python)
            status_ready: "System ready",
            status_error: "Connection error",
            status_updating: "New version detected {version}",
            status_downloading: "Downloading: {current} MB / {total} MB",
            status_updated: "Done! Version {version} installed",
            error_internet: "No connection. Using local version",
            status_extracting: "Extracting files",
            status_opening: "Opening game"
        }
    };
    
    function getLanguage() {
        const lang = navigator.language.split('-')[0];
        return i18n[lang] ? lang : 'en';
    }

    const currentLang = getLanguage();
    const langData = i18n[currentLang];
    
    function applyTranslations() {
        document.querySelectorAll('[data-i18n]').forEach(element => {
            const key = element.getAttribute('data-i18n');
            if (langData[key]) {
                element.innerText = langData[key];
            }
        });
    }

    // --- NUEVA FUNCIÓN PARA LOGS DESDE PYTHON ---
    function updateUIStatus(data) {
		const logElement = document.getElementById("log");
		const lang = getLanguage();
		
		let message = i18n[lang][data.key] || data.key;

		if (data.vars) {
			for (const [key, value] of Object.entries(data.vars)) {
				message = message.replace(`{${key}}`, value);
			}
		}

		// --- EFECTO DE ANIMACIÓN ---
		// Quitamos la clase (si existía) y la volvemos a poner para reiniciar la animación
		logElement.classList.remove('text-animate');
		
		// Forzamos un reflow (truco para que el navegador note el reinicio)
		void logElement.offsetWidth; 
		
		logElement.innerText = message;
		logElement.classList.add('text-animate');
	}

    function setProgress(value) {
        const prog = document.getElementById("progress");
        if (prog) prog.style.width = value + "%";
    }
	
	let isDownloading = false;

    async function descargar() {
        if (isDownloading) return;
        isDownloading = true;
        
        const btn = document.getElementById("actionButton");
        const btnText = document.getElementById("btnText");
        
        btn.style.opacity = "0.7";
        btnText.textContent = langData.btn_downloading;
		btn.disabled = true;
        
        // Usamos la función interna para mostrar el inicio
        updateUIStatus({key: 'status_downloading'});

        try {
            await window.pywebview.api.descargar_juego();
            setProgress(100);
            await setPlayMode();
        } catch (e) {
            updateUIStatus({key: 'status_error'});
            console.error(e);
        } finally {
            isDownloading = false;
            btn.style.opacity = "1";
			btn.disabled = false;
        }
    }

    async function setPlayMode() {
        try {
            let data = await window.pywebview.api.verificar_estado();
            let state = JSON.parse(data);
            const btnText = document.getElementById("btnText");
            const btn = document.getElementById("actionButton");

            if (state.needs_update) {
                btnText.textContent = langData.btn_update;
                btn.onclick = descargar;
            } else if (state.installed) {
                btnText.textContent = langData.btn_play; // Traducido
                btn.onclick = async () => {
                    updateUIStatus({key: 'status_opening'});
                    await window.pywebview.api.abrir_juego();
                };
                setProgress(100);
            } else {
                btnText.textContent = langData.btn_download; // Traducido
                btn.onclick = descargar;
                setProgress(0);
            }
        } catch(e) { console.error(e); }
    }

    // Inicialización
    window.addEventListener('pywebviewready', () => {
        setPlayMode();
        // Opcional: poner un log inicial limpio
        updateUIStatus({key: 'status_ready'});
    });

    document.addEventListener('DOMContentLoaded', () => {
        const video = document.getElementById('bg-video');
        if (video) {
            video.play().catch(e => console.log("Autoplay blocked:", e));
        }
        applyTranslations();
    });

    // Funciones de ventana
    function minimizar() { window.pywebview.api.minimizar(); }
    function cerrar() { window.pywebview.api.cerrar(); }
</script>
</body>
</html>
